name: 'AI Guardrails Check'
description: 'Run ai-guardrails hold-the-line lint check. Fails if new issues are introduced.'

inputs:
  mode:
    description: 'Check mode: check (default) or strict'
    required: false
    default: 'check'
  baseline:
    description: 'Path to baseline file'
    required: false
    default: '.guardrails-baseline.json'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning'
    required: false
    default: 'false'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.11'

outputs:
  new-issues:
    description: 'Number of new issues found'
    value: ${{ steps.check.outputs.new-issues }}

runs:
  using: 'composite'
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install ai-guardrails
      shell: bash
      run: uv tool install ai-guardrails

    - name: Run ai-guardrails check
      id: check
      shell: bash
      run: |
        if [ "${{ inputs.upload-sarif }}" = "true" ]; then
          ai-guardrails check --baseline "${{ inputs.baseline }}" --output-format sarif > results.sarif
          echo "new-issues=$(jq '.runs[0].results | length' results.sarif)" >> "$GITHUB_OUTPUT"
        else
          ai-guardrails check --baseline "${{ inputs.baseline }}"
          echo "new-issues=0" >> "$GITHUB_OUTPUT"
        fi

    - name: Upload SARIF results
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
