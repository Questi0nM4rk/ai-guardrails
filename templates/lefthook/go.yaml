# AI Guardrails — Go lefthook hooks
# Merged when go language is detected.

pre-commit:
  commands:
    go-format-and-stage:
      glob: "*.go"
      run: gofmt -w {staged_files} && git add {staged_files}
      stage_fixed: true
      priority: 1
    go-vet:
      glob: "*.go"
      run: go vet ./...
      priority: 2
    staticcheck:
      glob: "*.go"
      run: staticcheck ./...
      priority: 2
