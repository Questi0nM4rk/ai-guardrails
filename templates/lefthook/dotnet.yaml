# AI Guardrails — C#/.NET lefthook hooks
# Merged when dotnet language is detected.

pre-commit:
  commands:
    dotnet-format-and-stage:
      glob: "*.{cs,csx,vb}"
      run: dotnet format --severity info && git add {staged_files}
      stage_fixed: true
      priority: 1
    dotnet-build:
      glob: "*.{cs,csx,vb,csproj,sln}"
      run: dotnet build --no-restore -warnaserror -c Release
      priority: 2
