name: Claude Reviewer Bot (@cc-review mentions)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  cc-review-respond:
    runs-on: ubuntu-latest
    if: contains(github.event.comment.body, '@cc-review')
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch memory branch
        run: git fetch origin claude-reviewer/memory:claude-reviewer/memory 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Extract user request
        id: extract
        run: |
          PR_NUMBER="${{ github.event.issue.number }}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Post initial comment
        id: init-comment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMENT_ID=$(gh api repos/${{ github.repository }}/issues/${{ steps.extract.outputs.pr_number }}/comments \
            --method POST \
            -f body="**cc-review** is reviewing this PR..." \
            --jq '.id')
          echo "comment_id=$COMMENT_ID" >> "$GITHUB_OUTPUT"

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Verify Claude Code
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          echo "Claude location: $(which claude)"
          claude --version
          echo "OAuth token set: ${CLAUDE_CODE_OAUTH_TOKEN:+yes}"
          echo "Token prefix: ${CLAUDE_CODE_OAUTH_TOKEN:0:10}..."

      - name: Run Claude Code review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ steps.extract.outputs.pr_number }}"

          # Build prompt
          cat > /tmp/review-prompt.txt <<ENDOFPROMPT
          You are a code review bot for the repository ${{ github.repository }}.
          Review PR #${PR_NUMBER}.

          Follow the review process in .claude/commands/review-pr.md (read it first).
          The PR number to use is: ${PR_NUMBER}

          Use gh pr diff ${PR_NUMBER} and gh pr view ${PR_NUMBER} to get the PR context.
          Post your review using gh pr review ${PR_NUMBER} with --approve or --request-changes.

          Be concise and direct. Focus on real issues.
          ENDOFPROMPT

          echo "=== Prompt ==="
          cat /tmp/review-prompt.txt
          echo "=== Running Claude ==="

          claude -p \
            --max-turns 10 \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash(gh:*),Bash(git:*),Read,Glob,Grep,Agent" \
            --verbose \
            "$(cat /tmp/review-prompt.txt)"

      - name: Update comment with result
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          COMMENT_ID="${{ steps.init-comment.outputs.comment_id }}"
          if [ -n "$COMMENT_ID" ]; then
            BODY="**cc-review** finished reviewing PR #${{ steps.extract.outputs.pr_number }}."
            gh api repos/${{ github.repository }}/issues/comments/$COMMENT_ID \
              --method PATCH \
              -f body="$BODY" || true
          fi
