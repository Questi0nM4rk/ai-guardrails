# Release workflow — triggered on tag push matching v*
#
# Release process:
#   1. Update version in package.json: npm version <patch|minor|major> --no-git-tag-version
#   2. Commit: git commit -am "chore: release v<version>"
#   3. Tag:    git tag v<version>
#   4. Push:   git push origin main --tags
#
# Cross-platform builds are deferred to phase 4.3.
# This workflow produces a Linux x64 binary only.

name: Release

on:
  push:
    tags: ["v*"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write # needed to create releases

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for changelog generation

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build binary
        run: bun run build

      - name: Compute SHA-256 checksum
        run: |
          cd dist
          sha256sum ai-guardrails > ai-guardrails.sha256
          cat ai-guardrails.sha256

      - name: Generate changelog
        id: changelog
        run: |
          # Get the previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            # First release — use all commits
            CHANGES=$(git log --oneline --no-decorate)
          else
            CHANGES=$(git log --oneline --no-decorate "${PREV_TAG}..HEAD")
          fi
          # Write to file for gh release
          echo "$CHANGES" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/changelog.md \
            dist/ai-guardrails \
            dist/ai-guardrails.sha256
