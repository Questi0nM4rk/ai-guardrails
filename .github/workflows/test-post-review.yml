name: Test Post Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to post review on'
        required: true
        default: '98'

jobs:
  post-review:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Post review as bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/reviews \
            --method POST \
            --input test-review-payload.json \
            --jq '{id: .id, state: .state, user: .user.login}'
