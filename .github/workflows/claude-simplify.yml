name: Claude Simplify Review

# Code simplification review — trigger manually or via PR label.
# Focuses on reuse, quality, and efficiency.

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to simplify-review"
        required: true

jobs:
  simplify:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.label.name == 'simplify')
    timeout-minutes: 20

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch memory branch
        run: git fetch origin claude-reviewer/memory:claude-reviewer/memory 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code simplify review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.number }}"

          PROMPT=$(cat <<ENDOFPROMPT
          You are a code review bot for the repository ${{ github.repository }}.
          Perform a simplification review on PR #${PR_NUMBER}.

          Follow the instructions in .claude/commands/simplify-review.md (read it first).
          The PR number to use is: ${PR_NUMBER}

          Use \`gh pr diff ${PR_NUMBER}\` and \`gh pr view ${PR_NUMBER}\` to get the PR context.
          Post your review using \`gh pr review ${PR_NUMBER}\` with --approve or --request-changes.
          ENDOFPROMPT
          )

          claude -p \
            --max-turns 30 \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash(gh:*),Bash(git:*),Read,Glob,Grep,Agent" \
            "$PROMPT"
