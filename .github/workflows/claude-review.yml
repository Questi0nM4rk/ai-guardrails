name: Claude Auto Review

on:
  pull_request:
    types: [opened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    # Don't review PRs opened by the bot itself
    if: >-
      !contains(github.event.pull_request.user.login, '[bot]')
    timeout-minutes: 15

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch memory branch
        run: git fetch origin claude-reviewer/memory:claude-reviewer/memory 2>/dev/null || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.REVIEWER_APP_ID }}
          private-key: ${{ secrets.REVIEWER_APP_PRIVATE_KEY }}

      - name: Install Claude Code
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Claude Code review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          claude -p \
            --max-turns 30 \
            --model claude-sonnet-4-6 \
            --allowedTools "Bash(gh:*),Bash(git:*),Read,Glob,Grep,Agent" \
            "You are a code review bot for ${{ github.repository }}. Review PR #${PR_NUMBER}. Read .claude/commands/review-pr.md first, then follow those instructions. The PR number is ${PR_NUMBER}."
