# ai-guardrails:hash:sha256:dfac25cfa7842301182c7432a7c9800880b049110a7c14f65d742c4d2659ab37
pre-commit:
  commands:
    suppress-comments:
      glob: '*.{py,js,ts,tsx,jsx,rs,cs,go,lua,sh}'
      run: uv run python -m ai_guardrails.hooks.suppress_comments {staged_files}
      priority: 2
    protect-configs:
      glob: ruff.toml|lefthook.yml|.editorconfig|.markdownlint.jsonc|.codespellrc
      run: uv run python -m ai_guardrails.hooks.protect_configs {staged_files}
      priority: 2
    gitleaks:
      run: gitleaks protect --staged --no-banner
      priority: 2
    detect-secrets:
      glob: '!.secrets.baseline'
      run: detect-secrets-hook --baseline .secrets.baseline {staged_files}
      priority: 2
    codespell:
      glob: '*.{py,md,txt,yaml,yml,toml,json}'
      run: codespell --check-filenames {staged_files}
      priority: 2
    markdownlint:
      glob: '*.md'
      run: markdownlint-cli2 {staged_files}
      priority: 2
    validate-configs:
      run: uv run python -m ai_guardrails generate --check
      priority: 2
    python-format-and-stage:
      glob: '*.py'
      run: uv run ruff format {staged_files} && uv run ruff check --fix --exit-zero
        {staged_files} && git add {staged_files}
      stage_fixed: true
      priority: 1
    guardrails-check:
      glob: '*.py'
      run: uv run python -m ai_guardrails check
      priority: 2
    node-format-and-stage:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: biome check --apply {staged_files} && git add {staged_files}
      stage_fixed: true
      priority: 1
    biome-check:
      glob: '*.{js,jsx,ts,tsx,mjs,cjs}'
      run: biome check --error-on-warnings {staged_files}
      priority: 2
commit-msg:
  commands:
    conventional:
      run: grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(.+\\))?!?:"
        {1}
