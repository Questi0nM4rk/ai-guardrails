pre-commit:
  commands:
    ts-format-and-stage:
      glob: "*.{ts,tsx,js,jsx}"
      run: biome check --write {staged_files} && git add {staged_files}
      stage_fixed: true
      priority: 1

    biome-lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: biome check {staged_files}
      fail_text: "Biome lint/format errors found"
      priority: 2

    # typecheck: enabled after `bun install` (tsc not available until then)
    # typecheck:
    #   glob: "*.{ts,tsx}"
    #   run: tsc --noEmit
    #   fail_text: "TypeScript type errors found"
    #   priority: 2

    gitleaks:
      run: gitleaks protect --staged --no-banner
      fail_text: "Potential secrets detected"
      priority: 2

    codespell:
      glob: "*.{ts,md,txt,yaml,yml,toml,json}"
      run: codespell --check-filenames {staged_files}
      fail_text: "Spell errors found"
      priority: 2

    markdownlint:
      glob: "*.md"
      run: markdownlint-cli2 {staged_files}
      fail_text: "Markdown lint errors found"
      priority: 2

    no-commits-to-main:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "main" ]; then
          echo "Direct commits to main are not allowed — open a PR"
          exit 1
        fi
      fail_text: "Do not commit directly to main"
      priority: 2

commit-msg:
  commands:
    conventional:
      run: grep -qE "^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\(.+\))?!?:" {1}
      fail_text: "Commit message must follow Conventional Commits format"
