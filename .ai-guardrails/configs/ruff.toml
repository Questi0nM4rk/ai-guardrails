# Ruff Configuration - PEDANTIC Python Linting
# https://docs.astral.sh/ruff/configuration/
# Copy to project root as ruff.toml
#
# Philosophy: AI agents need hard stops. No warnings, no suggestions.
# Everything is an error or it's ignored.

target-version = "py311"
line-length = 88
indent-width = 4

# Strict: never auto-fix, force manual review
fix = false
unsafe-fixes = false

[lint]
# Enable ALL rules, then ignore categories that are redundant or too noisy.
# Projects can re-enable ignored rules via .guardrails-exceptions.toml.
select = ["ALL"]

ignore = [
  # === Formatter conflicts (ruff format handles these) ===
  "W191",   # tab-indentation
  "E111",   # indentation-with-invalid-multiple
  "E114",   # indentation-with-invalid-multiple-comment
  "E117",   # over-indented
  "D206",   # indent-with-spaces
  "D300",   # triple-single-quotes
  "Q000",   # bad-quotes-inline-string
  "Q001",   # bad-quotes-multiline-string
  "Q002",   # bad-quotes-docstring
  "Q003",   # avoidable-escaped-quote
  "COM812", # missing-trailing-comma
  "COM819", # prohibited-trailing-comma
  "ISC001", # single-line-implicit-string-concatenation
  "ISC002", # multi-line-implicit-string-concatenation

  # === Redundant with mypy --strict ===
  # Ruff only checks "is there a type hint?" — mypy validates correctness.
  # Running both creates duplicate noise with no extra safety.
  "ANN",

  # === Docstrings — opt-in, not default ===
  # Requiring docstrings on every function generates the most exceptions.
  # Projects that want docstrings can re-enable D in their registry.
  "D",

  # === Development markers ===
  # Blocking commits over TODO/FIXME is counterproductive during active work.
  "FIX001", # line contains FIXME
  "FIX002", # line contains TODO
  "TD",     # flake8-todos (author, link, formatting requirements)

  # === High false-positive / low value ===
  "ERA001", # commented-out code (many false positives)
  "CPY001", # missing copyright notice
  "INP001", # implicit namespace package (missing __init__.py)
  "T201",   # print found (legitimate in CLIs, scripts, debugging)
  "EM101",  # string literal in exception (forces msg = "..."; raise Err(msg))
  "EM102",  # f-string in exception (same — adds noise, no real benefit)
  "TRY003", # long exception message (same category as EM)
  "S101",   # assert usage (legitimate for invariants and preconditions)
]

# Keep pydocstyle convention set even though D is ignored by default,
# so projects that re-enable D get Google style automatically.
[lint.pydocstyle]
convention = "google"

# === TYPE CHECKING IMPORTS ===
[lint.flake8-type-checking]
strict = true
runtime-evaluated-base-classes = ["pydantic.BaseModel"]

# === IMPORTS - TOP OF FILE ONLY ===
[lint.isort]
force-single-line = false
force-sort-within-sections = true
known-first-party = []
combine-as-imports = true
split-on-trailing-comma = true
force-to-top = ["__future__"]
# PEP 563: Deferred annotation evaluation (strings instead of objects)
# Benefits: Avoids circular imports, enables forward references without quotes
# Tradeoffs: Runtime issues with get_type_hints(), some ORMs, Pydantic v1
#   Mitigations: Keep types at module level, use model_rebuild() in Pydantic v2
# Note: PEP 649/749 will supersede this with lazy evaluation (no string storage)
required-imports = ["from __future__ import annotations"]

# === PATHLIB - MANDATORY (no os.path) ===
# PTH rules are in ALL, this ensures they're not ignored

# === RETURNS - EXPLICIT ALWAYS ===
# RET rules are in ALL - explicit returns required

# === SIMPLIFY - FORCE CLEAN CODE ===
# SIM rules are in ALL - no complex conditionals

# === NAMING CONVENTIONS ===
[lint.pep8-naming]
classmethod-decorators = [
  "classmethod",
  "pydantic.validator",
  "pydantic.field_validator",
]
staticmethod-decorators = ["staticmethod"]

# === COMPLEXITY LIMITS - STRICT ===
[lint.mccabe]
max-complexity = 10

[lint.pylint]
max-args = 5
max-bool-expr = 3
max-branches = 10
max-locals = 10
max-nested-blocks = 3
max-positional-args = 5
max-public-methods = 15
max-returns = 4
max-statements = 30

# === BUGBEAR - STRICT ===
[lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path"]

# === COMPREHENSIONS - FORCE CLEAN ===
[lint.flake8-comprehensions]
allow-dict-calls-with-keyword-arguments = false

# === QUOTES - CONSISTENT ===
[lint.flake8-quotes]
inline-quotes = "double"
multiline-quotes = "double"
docstring-quotes = "double"

# === TIDY IMPORTS ===
[lint.flake8-tidy-imports]
ban-relative-imports = "all"

[lint.flake8-tidy-imports.banned-api]
"typing.Optional".msg = "Use `X | None` instead"
"typing.Union".msg = "Use `X | Y` instead"
"typing.List".msg = "Use `list[X]` instead"
"typing.Dict".msg = "Use `dict[X, Y]` instead"
"typing.Set".msg = "Use `set[X]` instead"
"typing.Tuple".msg = "Use `tuple[X, ...]` instead"

# === ERRMSG - PROPER EXCEPTIONS ===
[lint.flake8-errmsg]
max-string-length = 50

# === PYTEST STYLE ===
[lint.flake8-pytest-style]
fixture-parentheses = true
mark-parentheses = true
parametrize-names-type = "csv"
parametrize-values-type = "list"
raises-require-match-for = [
  "ValueError",
  "TypeError",
  "KeyError",
  "RuntimeError",
]

# === PER-FILE IGNORES ===
[lint.per-file-ignores]
"tests/**/*.py" = [
  "ARG001",  # unused function argument (fixtures)
  "ARG002",  # unused method argument
  "PLR2004", # magic value comparison in tests
]
"__init__.py" = [
  "F401", # unused import (re-exports)
]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "lf"
docstring-code-format = true
docstring-code-line-length = 80
