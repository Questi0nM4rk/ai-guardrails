version: 1
mode: standard
auto_review: true

languages:
  - python

ignore_paths:
  - "docs/**"
  - "**/*.md"

instructions: |
  Python CLI tool using cyclopts + pipeline architecture with DI.
  Generated configs are hash-protected — never edit them directly.
  All lint suppressions go through .guardrails-exceptions.toml, not inline.
  All subprocess calls must use `uv run` — never bare `python` or `ruff`.
  Max 200 lines per module. No unparameterized dict/list in public APIs.

known_patterns:
  - "ARG002 on ctx parameter in pipeline steps — required by protocol"

slop_detection: true
memory: true
