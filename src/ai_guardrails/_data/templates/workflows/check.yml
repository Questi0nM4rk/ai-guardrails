name: AI Guardrails Check

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install lefthook
        run: npm install -g lefthook
      - name: Install ai-guardrails
        run: uv tool install ai-guardrails
      - name: Verify configs are fresh
        run: ai-guardrails generate --check
      - name: Run pre-commit hooks
        run: lefthook run pre-commit --all-files --no-auto-output

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Install semgrep
        run: uv tool install semgrep
      - name: Run semgrep
        run: semgrep --config auto --error .

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ai-guardrails check
        uses: Questi0nM4rk/ai-guardrails@v2
        with:
          upload-sarif: 'true'
