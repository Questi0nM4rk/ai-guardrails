- id: detect-suppression-comments
  name: Detect suppression comments
  description: >
    Blocks lint/type suppression comments (noqa, type: ignore, eslint-disable,
    etc.) in non-test source files. Exceptions require an entry in
    .suppression-allowlist.
  language: python
  entry: python -m ai_guardrails.hooks.suppress_comments
  types: [file]
  pass_filenames: true

- id: format-and-stage
  name: Format staged files
  description: >
    Auto-formats staged files (ruff, biome, shfmt, rustfmt, etc.) and
    re-stages only modified files. Runs before any lint checks.
  language: python
  entry: python -m ai_guardrails.hooks.format_stage
  pass_filenames: false
  always_run: true

- id: detect-config-ignore-edits
  name: Detect config ignore-pattern edits
  description: >
    Blocks direct additions of ignore patterns (noqa, per-file-ignores, etc.)
    to config files. Exceptions must go in .guardrails-exceptions.toml.
  language: python
  entry: python -m ai_guardrails.hooks.config_ignore
  pass_filenames: false
  always_run: true
