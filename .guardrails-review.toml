# Guardrails Review — LLM-powered PR reviewer
# SETUP: Set model below, add OPENROUTER_KEY to GitHub secrets.

[config]
model = "minimax/minimax-m2.5"

[review]
# max_diff_chars = 120000
agentic = true # Enable tool-use loop for context-gathering before review
# max_iterations = 5    # Max tool-use rounds before forcing review submission
auto_merge = true      # Auto-merge PR after approval (requires repo auto-merge enabled)
merge_method = "squash"

extra_instructions = """
## Business Context

ai-guardrails is a CLI tool that enforces pedantic code quality on AI-maintained repos.
It generates and owns tamper-protected config files (ruff.toml, lefthook.yml,
.editorconfig, etc.) and installs git hooks that catch suppression comments, dangerous
commands, and direct edits to generated configs. The tool's value proposition: a human
sets up guardrails once; AI agents cannot weaken them without detection.

Key business invariants:
- Generated configs are hash-protected. Any tamper (direct edit) is caught at commit time.
- The single source of truth for all tool versions is uv.lock. CI and local hooks must
  use the same pinned versions via `uv run <tool>`.
- No inline suppression comments (# noqa, # type: ignore) without a .suppression-allowlist
  entry. The hook enforce this at commit time.
- The dangerous_cmd hook (PreToolUse on Bash) blocks destructive operations and hook
  bypasses (--no-verify, --force, rm -rf /, etc.) before Claude Code runs them.
- Global install writes hooks into ~/.claude/settings.json for machine-wide protection.
  Per-project install writes into .claude/settings.json for project-level protection.

## Architecture

Pipeline + Plugin with DI (dependency injection through PipelineContext).

### Layers (src/ai_guardrails/)
- **CLI** (cli.py): cyclopts app → Command dataclasses → dispatch to pipelines
- **Pipelines** (pipelines/): InstallPipeline, InitPipeline, GeneratePipeline,
  StatusPipeline — orchestrate steps, inject infra via PipelineContext
- **Steps** (steps/): DetectLanguages, CopyConfigs, ScaffoldRegistry, LoadRegistry,
  GenerateConfigs, SetupCI, SetupAgentInstructions, StatusStep — each step has
  validate() returning errors and execute() returning StepResult
- **Language Plugins** (languages/): UniversalPlugin (always active), PythonPlugin,
  NodePlugin, RustPlugin, GoPlugin, DotnetPlugin, CppPlugin, LuaPlugin, ShellPlugin.
  Each implements: detect(project_dir) → bool, generate(registry, project_dir) → {path: content},
  hook_config() → dict (merged into lefthook.yml), check(registry, project_dir) → [issues]
- **Generators** (generators/): base hash utilities; per-language format (ruff, biome, etc.)
- **Hooks** (hooks/): Python scripts run at commit time: dangerous_cmd (PreToolUse gate),
  suppress_comments (blocks new # noqa/type:ignore), protect_configs (blocks direct edits
  to generated files), config_ignore (blocks ignore-pattern additions in non-generated configs)
- **Infra** (infra/): FileManager, CommandRunner, ConfigLoader, Console — all injected,
  never imported directly in business logic
- **Models** (models/): ExceptionRegistry (the .guardrails-exceptions.toml parsed model)
- **Constants** (constants.py): Single source of truth for all shared patterns

### Critical design rules
- All hooks run via `uv run python -m ai_guardrails.hooks.<name>` — never bare `python -m`
  (bare python calls system Python outside the venv, causing ModuleNotFoundError)
- Generated configs carry a sha256 hash header; any change to generation logic requires
  regenerating and recommitting the config
- PipelineStep Protocol: steps are duck-typed, not inherited — validate() must return
  [] before execute() is called by Pipeline
- Exception registry provides the ONLY legitimate way to add lint ignores — never edit
  generated configs directly

## Focus Areas for Review

- **Correctness**: Does generate() produce the same content that check() expects? They
  must use the same body-building function or they will silently diverge.
- **Security**: Hook scripts must not be bypassable. Dangerous command patterns must
  cover real-world bypass vectors (--no-verify, -n, SKIP=, core.hooksPath, etc.)
- **Type safety**: No unparameterized `dict` or `list` in public APIs. dict[str, Any]
  is acceptable only for local variables from JSON parsing — never in function signatures.
- **uv discipline**: Every shell invocation of Python tools must use `uv run`. Bare
  `ruff`, `python`, `mypy` calls diverge from the pinned uv.lock versions.
- **Suppression hygiene**: No new # noqa or # type: ignore without .suppression-allowlist.
  Any such comment in new code is a finding that must be resolved by fixing the root cause.
- **Logic bugs and missing error handling**: StepResult status must accurately reflect
  what happened. `assert` in production code is eliminated by python -O — use explicit
  if/raise RuntimeError instead.
"""
